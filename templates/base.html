<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PartFinder — legitimate local part-time jobs for students around Nottingham.">
    <title>{% block title %}PartFinder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="{{ url_for('index') }}">
                <span class="brand-mark">PartFinder</span>
            </a>
            <p class="brand-tagline">Local part-time work for Nottingham students</p>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Searching around {{ origin }}. Only part-time, casual, and student-friendly roles posted within the last two weeks.</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
